<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto PosterDev</title>
    <style>
        /* CSS: Aqui a gente cuida da beleza do site */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background 0.5s; /* Suaviza a troca de cor */
        }

        .cartao {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        h1 { color: #00ff88; }

        button {
            background-color: #00ff88;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover { background-color: #00cc6e; }

        ul { list-style: none; padding: 0; }

        li { margin: 10px 0; }

        a { color: #4db8ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="cartao">
        <h1>Olá,  Bem Vindo(a) ao meu Projeto! 👨‍💻</h1>
        <p>Estou começando minha jornada para ser um  <strong>PROGRAMADOR</strong>. Acesse minhas redes através dos links, Obrigado.</p>
        
        <hr>

        <ul>
            <li><a href="https://github.com/PosterDev" target="_blank">Meu GitHub</a></li>
            
            <li><a href="https://www.linkedin.com/in/antonio-posteraro-78b787255" target="_blank">Meu LinkedIn</a></li>
        </ul>

        <button onclick="mudarCor()">Mudar a Cor</button>
    </div>

    <script>
        function mudarCor() {
            const cores = ['#121212', '#1a237e', '#311b92', '#1b5e20', '#b71c1c'];
            const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
            document.body.style.backgroundColor = corAleatoria;
        }
    </script>

</body>
</html>
